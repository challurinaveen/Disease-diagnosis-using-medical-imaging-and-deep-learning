version: '3.8'

services:
  backend:
    build: ./backend
    container_name: medical-ai-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - MODELS_DIR=/app/models
      - TF_CPP_MIN_LOG_LEVEL=2
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: medical-ai-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: medical-ai-network
